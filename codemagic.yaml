workflows:
  ios-app-store:
    name: Proman iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: vdoh
    environment:
      groups:
        - vdoh_signing
      xcode: latest
      vars:
        XCODE_SCHEME: "ATMA"
        BUNDLE_ID: "com.ryndin.vdoh"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install XcodeGen
        script: HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd "$CM_BUILD_DIR"
          xcodegen generate
      - name: Set up code signing (auto via ASC API key)
        script: |
          cd "$CM_BUILD_DIR"
          keychain initialize
          # Stable certificate private key from env (base64) — must persist across builds
          echo "$CERTIFICATE_PRIVATE_KEY" | openssl base64 -A -d -out /tmp/cert_key.pem
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create \
            --verbose
          keychain add-certificates --certificate-key=@file:/tmp/cert_key.pem
          echo "===== Applying profiles to project ====="
          xcode-project use-profiles --verbose
      - name: Set build number
        script: |
          cd "$CM_BUILD_DIR"
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $(($LATEST + 1))
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/Proman.xcodeproj" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - rerebmx@gmail.com
        notify:
          success: true
          failure: true
